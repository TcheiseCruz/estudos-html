<!DOCTYPE html>
<html lang="pt-BR">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width", initial-scale="1.0">
        <title>Semântica</title>
    </head>

    <body>

        <!--Cabeçalho da página ou de uma seção-->
        <header>
            <h1>Aprendendo Semântica</h1>
            <nav>
                <!--nav = bloco de navegação principal-->
                <a href="index.html">Home</a>
                <a href="sobre.html">Sobre mim</a>
                <a href="contato.html">Fale Comigo!</a>
            </nav>

        </header>

        <!--Conteúdo principal - só um por página -->
        <main>

            <!-- section = agrupamento temático com título-->
             <section>
                <h2>Últimos posts</h2>

                <!-- article = conteúdo independente (post, notícia, card) -->
                 <article></article>
                 <h3>Post 1</h3>
                 <p>Resumo do post...</p>
                 </article>
             </section>

             <!-- aside = conteúdo relacionado mas secundário -->
              <aside>
                <h2>Sobre a autora</h2>
                <p>Tcheise, desenvolvedora front-end em formação.</p>
              </aside>

        </main>

        <!--Rodapé da página-->
    
        <footer>© 2026 Tcheise? — feito com HTML puro e muito café.</footer>
    </body>

</html>
